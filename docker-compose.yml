services:
  db:
    image: mysql:8.0
    container_name: payment_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      # Hardcoded to avoid conflicts with your server's .env root user
      MYSQL_DATABASE: payment_db
      MYSQL_USER: payment_user
      MYSQL_PASSWORD: payment_pass_2026
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  app:
    build: .
    container_name: payment_app
    restart: unless-stopped
    ports:
      - "5005:8000"
    env_file:
      - .env
    environment:
      # Hardcoded to force connection to the Docker DB, ignoring .env
      - MYSQL_HOST=db
      - MYSQL_USER=payment_user
      - MYSQL_PASSWORD=payment_pass_2026
      - MYSQL_DATABASE=payment_db
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
